name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install pytest fastapi httpx
      - name: Compile runtime
        run: python -m compileall -q auxiliary_brain dashboard/plugin_api.py scripts __init__.py install.py
      - name: Run tests
        run: python -m pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
